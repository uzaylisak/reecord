<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REEcord — Chat</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0c0c0e;
    color: #fff;
    font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    display: flex;
    overflow: hidden;
  }

  /* ── Sidebar ── */
  #sidebar {
    width: 260px;
    min-width: 260px;
    background: #101012;
    border-right: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    height: 100vh;
  }
  .sidebar-header {
    padding: 20px 16px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 22px; height: 22px;
    background: #e03131;
    border-radius: 50%;
    box-shadow: 0 0 10px rgba(224,49,49,0.4);
    flex-shrink: 0;
  }
  .logo-text {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .logo-text span { color: #e03131; }
  .new-btn {
    background: rgba(224,49,49,0.12);
    border: 1px solid rgba(224,49,49,0.25);
    color: #e03131;
    border-radius: 8px;
    padding: 6px 10px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
  }
  .new-btn:hover { background: rgba(224,49,49,0.2); }
  .session-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 8px;
  }
  .session-list::-webkit-scrollbar { width: 4px; }
  .session-list::-webkit-scrollbar-track { background: transparent; }
  .session-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  .session-item {
    padding: 10px 10px;
    border-radius: 9px;
    cursor: pointer;
    margin-bottom: 2px;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .session-item:hover { background: rgba(255,255,255,0.05); }
  .session-item.active { background: rgba(224,49,49,0.1); }
  .session-icon {
    width: 28px; height: 28px;
    background: rgba(255,255,255,0.06);
    border-radius: 7px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }
  .session-item.finalized .session-icon { background: rgba(74,222,128,0.1); }
  .session-body { flex: 1; min-width: 0; }
  .session-preview {
    font-size: 13px;
    color: rgba(255,255,255,0.75);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-meta {
    font-size: 11px;
    color: rgba(255,255,255,0.3);
    margin-top: 2px;
  }
  .session-del {
    background: none;
    border: none;
    color: rgba(255,255,255,0.2);
    cursor: pointer;
    font-size: 15px;
    padding: 2px 4px;
    border-radius: 4px;
    opacity: 0;
    transition: opacity 0.15s, color 0.15s;
  }
  .session-item:hover .session-del { opacity: 1; }
  .session-del:hover { color: #f87171; }
  .sidebar-footer {
    padding: 14px 12px;
    border-top: 1px solid rgba(255,255,255,0.06);
  }
  .reset-btn {
    width: 100%;
    background: none;
    border: 1px solid rgba(255,255,255,0.08);
    color: rgba(255,255,255,0.35);
    border-radius: 8px;
    padding: 8px;
    font-size: 12px;
    font-family: inherit;
    cursor: pointer;
    transition: all 0.2s;
  }
  .reset-btn:hover { border-color: rgba(248,113,113,0.3); color: #f87171; }

  /* ── Main ── */
  #main {
    flex: 1;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }
  .top-bar {
    padding: 14px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }
  .model-select {
    background: #141416;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: #fff;
    font-size: 13px;
    font-family: inherit;
    padding: 7px 12px;
    outline: none;
    cursor: pointer;
  }
  .model-select option { background: #141416; }
  .top-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4ade80;
    box-shadow: 0 0 6px rgba(74,222,128,0.6);
  }
  .status-dot.off { background: #f87171; box-shadow: 0 0 6px rgba(248,113,113,0.6); }
  .status-label { font-size: 12px; color: rgba(255,255,255,0.4); }

  /* ── Messages ── */
  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
  .msg {
    max-width: 72%;
    line-height: 1.6;
    font-size: 14px;
  }
  .msg.user {
    align-self: flex-end;
    background: #e03131;
    color: #fff;
    padding: 12px 16px;
    border-radius: 16px 16px 4px 16px;
  }
  .msg.assistant {
    align-self: flex-start;
    background: #141416;
    border: 1px solid rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.9);
    padding: 12px 16px;
    border-radius: 4px 16px 16px 16px;
    white-space: pre-wrap;
  }
  .msg.thinking {
    align-self: flex-start;
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    font-style: italic;
    padding: 4px 0;
  }
  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: rgba(255,255,255,0.2);
    text-align: center;
  }
  .empty-state .icon {
    width: 48px; height: 48px;
    background: rgba(224,49,49,0.1);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .empty-state p { font-size: 14px; }

  /* ── Input bar ── */
  #input-area {
    padding: 16px 20px;
    border-top: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  #msg-input {
    flex: 1;
    background: #141416;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    color: #fff;
    font-size: 14px;
    font-family: inherit;
    padding: 12px 14px;
    outline: none;
    resize: none;
    min-height: 46px;
    max-height: 140px;
    line-height: 1.5;
    transition: border-color 0.2s;
  }
  #msg-input:focus { border-color: rgba(224,49,49,0.4); }
  #msg-input::placeholder { color: rgba(255,255,255,0.25); }
  .send-btn {
    background: #e03131;
    border: none;
    border-radius: 10px;
    color: #fff;
    width: 46px; height: 46px;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #c92a2a; }
  .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .finalize-row {
    margin-top: 10px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .finalize-btn {
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.25);
    color: #4ade80;
    border-radius: 9px;
    padding: 9px 18px;
    font-size: 13px;
    font-weight: 600;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .finalize-btn:hover { background: rgba(74,222,128,0.18); }
  .finalize-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .finalize-status {
    font-size: 12px;
    color: rgba(255,255,255,0.4);
  }
  .finalize-status.done { color: #4ade80; }
  .finalize-status.err { color: #f87171; }

  /* ── Progress bar ── */
  #progress-bar {
    height: 2px;
    background: linear-gradient(90deg, #e03131, #ff6b6b);
    width: 0%;
    transition: width 0.4s ease;
    position: absolute;
    top: 0; left: 0;
    display: none;
  }
</style>
</head>
<body>

<!-- Sidebar -->
<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo">
      <div class="logo-dot"></div>
      <div class="logo-text">REE<span>cord</span></div>
    </div>
    <button class="new-btn" onclick="newSession()">+ New</button>
  </div>
  <div class="session-list" id="session-list">
    <!-- sessions injected here -->
  </div>
  <div class="sidebar-footer">
    <button class="reset-btn" onclick="resetConfig()">⚙ Change credentials</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <div id="progress-bar"></div>

  <div class="top-bar">
    <span style="font-size:13px;color:rgba(255,255,255,0.4);">Model:</span>
    <select class="model-select" id="model-select">
      <option value="">Loading…</option>
    </select>
    <div class="top-right">
      <div class="status-dot off" id="status-dot"></div>
      <span class="status-label" id="status-label">Connecting…</span>
    </div>
  </div>

  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="icon">⬡</div>
      <p>Start a conversation.<br>When ready, click <strong style="color:rgba(255,255,255,0.6)">Finalize &amp; Record</strong> to anchor it on-chain.</p>
    </div>
  </div>

  <div id="input-area">
    <div class="input-row">
      <textarea id="msg-input" placeholder="Type a message…" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">➤</button>
    </div>
    <div class="finalize-row">
      <button class="finalize-btn" id="finalize-btn" onclick="finalizeSession()" disabled>
        ⬡ Finalize &amp; Record
      </button>
      <span class="finalize-status" id="finalize-status"></span>
    </div>
  </div>
</div>

<script>
  const PROXY = 'http://localhost:11434';

  let currentSession = null;
  let isWaiting = false;
  let finalizeJobId = null;
  let finalizePolling = null;

  // ── Init ──────────────────────────────────────────────────────────────────
  async function init() {
    await loadModels();
    await loadSessions();
    checkProxyStatus();
    setInterval(checkProxyStatus, 10000);
  }

  async function loadModels() {
    try {
      const r = await fetch(PROXY + '/reerecord/models');
      const d = await r.json();
      const sel = document.getElementById('model-select');
      sel.innerHTML = '';
      if (!d.models || d.models.length === 0) {
        sel.innerHTML = '<option value="">No REE models found</option>';
        return;
      }
      d.models.forEach(m => {
        const opt = document.createElement('option');
        opt.value = m.ollama_name;
        opt.textContent = m.ollama_name;
        sel.appendChild(opt);
      });
    } catch(e) {
      document.getElementById('model-select').innerHTML = '<option value="">Error loading models</option>';
    }
  }

  async function checkProxyStatus() {
    try {
      const r = await fetch(PROXY + '/reerecord/status');
      const d = await r.json();
      const dot = document.getElementById('status-dot');
      const lbl = document.getElementById('status-label');
      dot.className = 'status-dot';
      lbl.textContent = 'Proxy ready';
    } catch(e) {
      const dot = document.getElementById('status-dot');
      const lbl = document.getElementById('status-label');
      dot.className = 'status-dot off';
      lbl.textContent = 'Proxy offline';
    }
  }

  // ── Sessions ──────────────────────────────────────────────────────────────
  async function loadSessions() {
    try {
      const r = await fetch(PROXY + '/reerecord/sessions');
      const d = await r.json();
      renderSessions(d.sessions || []);
    } catch(e) {}
  }

  function renderSessions(sessions) {
    const el = document.getElementById('session-list');
    if (!sessions.length) {
      el.innerHTML = '<div style="padding:12px 10px;font-size:12px;color:rgba(255,255,255,0.2);">No sessions yet</div>';
      return;
    }
    el.innerHTML = sessions.map(s => `
      <div class="session-item ${s.finalized ? 'finalized' : ''} ${currentSession === s.session_id ? 'active' : ''}"
           onclick="loadSession('${s.session_id}')">
        <div class="session-icon">${s.finalized ? '✓' : '💬'}</div>
        <div class="session-body">
          <div class="session-preview">${escHtml(s.preview || 'Empty session')}</div>
          <div class="session-meta">${s.model} · ${s.message_count} msg${s.message_count !== 1 ? 's' : ''}</div>
        </div>
        <button class="session-del" onclick="deleteSession(event,'${s.session_id}')" title="Delete">×</button>
      </div>
    `).join('');
  }

  async function loadSession(sid) {
    currentSession = sid;
    await loadSessions();
    try {
      const r = await fetch(PROXY + '/reerecord/session/' + sid);
      const d = await r.json();
      renderMessages(d.messages || []);
      const finalized = d.finalized;
      document.getElementById('finalize-btn').disabled = finalized || (d.messages || []).length === 0;
      if (finalized) {
        const status = document.getElementById('finalize-status');
        status.className = 'finalize-status done';
        status.textContent = d.tx_hash ? '✓ Recorded — TX: ' + d.tx_hash.slice(0,10) + '…' : '✓ Finalized';
      }
    } catch(e) {}
  }

  function renderMessages(messages) {
    const el = document.getElementById('messages');
    if (!messages.length) {
      el.innerHTML = '<div class="empty-state" id="empty-state"><div class="icon">⬡</div><p>Start a conversation.<br>When ready, click <strong style="color:rgba(255,255,255,0.6)">Finalize &amp; Record</strong> to anchor it on-chain.</p></div>';
      return;
    }
    el.innerHTML = messages.map(m =>
      `<div class="msg ${m.role}">${escHtml(m.content)}</div>`
    ).join('');
    el.scrollTop = el.scrollHeight;
  }

  function newSession() {
    currentSession = null;
    finalizeJobId = null;
    clearInterval(finalizePolling);
    document.getElementById('messages').innerHTML = '<div class="empty-state" id="empty-state"><div class="icon">⬡</div><p>Start a conversation.<br>When ready, click <strong style="color:rgba(255,255,255,0.6)">Finalize &amp; Record</strong> to anchor it on-chain.</p></div>';
    document.getElementById('finalize-btn').disabled = true;
    document.getElementById('finalize-status').textContent = '';
    document.getElementById('finalize-status').className = 'finalize-status';
    loadSessions();
  }

  async function deleteSession(e, sid) {
    e.stopPropagation();
    await fetch(PROXY + '/reerecord/session/' + sid, { method: 'DELETE' });
    if (currentSession === sid) newSession();
    else loadSessions();
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  async function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById('msg-input');
    const msg = input.value.trim();
    if (!msg) return;
    const model = document.getElementById('model-select').value;
    if (!model) { alert('No model selected.'); return; }

    input.value = '';
    autoResize(input);
    isWaiting = true;
    document.getElementById('send-btn').disabled = true;
    document.getElementById('finalize-btn').disabled = true;

    // Show user message immediately
    const msgEl = document.getElementById('messages');
    const emptyState = document.getElementById('empty-state');
    if (emptyState) emptyState.remove();
    msgEl.innerHTML += `<div class="msg user">${escHtml(msg)}</div>`;
    msgEl.innerHTML += `<div class="msg thinking" id="thinking">Thinking…</div>`;
    msgEl.scrollTop = msgEl.scrollHeight;

    try {
      const r = await fetch(PROXY + '/reerecord/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ session_id: currentSession, message: msg, model })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      currentSession = d.session_id;

      const thinking = document.getElementById('thinking');
      if (thinking) thinking.remove();
      msgEl.innerHTML += `<div class="msg assistant">${escHtml(d.response)}</div>`;
      msgEl.scrollTop = msgEl.scrollHeight;
      document.getElementById('finalize-btn').disabled = false;
      loadSessions();
    } catch(e) {
      const thinking = document.getElementById('thinking');
      if (thinking) thinking.remove();
      msgEl.innerHTML += `<div class="msg assistant" style="color:#f87171;">Error: ${escHtml(e.message)}</div>`;
      msgEl.scrollTop = msgEl.scrollHeight;
    }

    isWaiting = false;
    document.getElementById('send-btn').disabled = false;
  }

  // ── Finalize ──────────────────────────────────────────────────────────────
  async function finalizeSession() {
    if (!currentSession) return;
    const btn = document.getElementById('finalize-btn');
    const status = document.getElementById('finalize-status');
    btn.disabled = true;
    status.className = 'finalize-status';
    status.textContent = 'Starting REE inference… (2–5 min)';
    showProgress(10);

    try {
      const r = await fetch(PROXY + '/reerecord/finalize', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ session_id: currentSession })
      });
      const d = await r.json();
      if (d.error) throw new Error(d.error);
      finalizeJobId = d.job_id;
      pollFinalize(finalizeJobId);
    } catch(e) {
      status.className = 'finalize-status err';
      status.textContent = 'Error: ' + e.message;
      btn.disabled = false;
      hideProgress();
    }
  }

  function pollFinalize(jobId) {
    clearInterval(finalizePolling);
    finalizePolling = setInterval(async () => {
      try {
        const r = await fetch(PROXY + '/reerecord/finalize/' + jobId);
        const d = await r.json();
        const status = document.getElementById('finalize-status');

        if (d.status === 'running') {
          status.textContent = d.step_label || 'Processing…';
          if (d.step === 'ree') showProgress(30);
          else if (d.step === 'receipt') showProgress(60);
          else if (d.step === 'chain') showProgress(80);
        } else if (d.status === 'done') {
          clearInterval(finalizePolling);
          showProgress(100);
          setTimeout(hideProgress, 800);
          status.className = 'finalize-status done';
          const tx = d.result?.tx_hash || '';
          status.textContent = tx
            ? '✓ Recorded — TX: ' + tx.slice(0,10) + '… — view on reecord.click'
            : '✓ Recorded on-chain';
          loadSessions();
        } else if (d.status === 'failed') {
          clearInterval(finalizePolling);
          hideProgress();
          const status2 = document.getElementById('finalize-status');
          status2.className = 'finalize-status err';
          status2.textContent = 'Failed: ' + (d.error || 'unknown error');
          document.getElementById('finalize-btn').disabled = false;
        }
      } catch(e) {}
    }, 3000);
  }

  function showProgress(pct) {
    const bar = document.getElementById('progress-bar');
    bar.style.display = 'block';
    bar.style.width = pct + '%';
  }
  function hideProgress() {
    const bar = document.getElementById('progress-bar');
    bar.style.width = '0%';
    setTimeout(() => { bar.style.display = 'none'; }, 400);
  }

  // ── Utils ─────────────────────────────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  async function resetConfig() {
    if (!confirm('This will clear your credentials and return to setup. Continue?')) return;
    await fetch('/api/reset-config', { method: 'POST' });
    window.location.href = '/setup';
  }

  init();
</script>
</body>
</html>
